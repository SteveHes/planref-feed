name: PlanRef Audio

on:
  push:
    paths:
      - 'audio-jobs/request.json'

permissions:
  contents: write

concurrency:
  group: planref-audio
  cancel-in-progress: false

jobs:
  audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install boto3
        run: pip install --quiet boto3

      - name: Run audio job
        env:
          XI_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://ea3b71f07c50da0e882b7a6b07135a82.r2.cloudflarestorage.com
        run: |
          MODE=$(python3 -c "import json; print(json.load(open('audio-jobs/request.json')).get('mode','clips'))")
          if [ "$MODE" = "guides" ]; then python3 audio-jobs/run_guides.py; else python3 audio-jobs/run_job.py; fi
        timeout-minutes: 120

      - name: Commit results
        run: |
          git config user.name "planref-audio-bot"
          git config user.email "audio-bot@planref.co.uk"
          git add -A audio-jobs/out
          git commit -m "Audio job results [skip ci]" || echo "nothing to commit"
          git pull --rebase origin main
          git push
